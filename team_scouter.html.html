<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スト6 全期間統合対戦ダイヤグラム & 被対策ツール</title>
    <style>
        /* --- 全体基本スタイル --- */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 15px;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        header {
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        @media (min-width: 768px) {
            header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }
        h1 {
            font-size: 20px;
            margin: 0;
            color: #fff;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        @media (min-width: 768px) { h1 { font-size: 24px; } }
        h1::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 22px;
            background: #ffcc00;
            border-radius: 2px;
        }
        .subtitle {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        
        /* --- キャラクター検索・抽出パネル --- */
        .search-panel {
            background: #151515;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .search-title {
            font-size: 14px;
            font-weight: bold;
            color: #ffcc00;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .search-select {
            width: 100%;
            max-width: 400px;
            padding: 10px;
            background: #252525;
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }
        .search-select:focus {
            border-color: #0070f3;
        }
        
        .result-container {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
            max-height: 260px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .result-card {
            background: #222;
            border: 1px solid #2d2d2d;
            border-radius: 6px;
            padding: 8px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }
        .result-char-name {
            font-weight: bold;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .result-rate-val {
            font-family: monospace;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* --- 持ちキャラ（手札）設定＆分析パネル --- */
        .analyze-panel {
            background: #191d24;
            border: 1px solid #2b3545;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .hand-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
            max-height: 250px;
            overflow-y: auto;
            padding: 5px;
            background: #111;
            border-radius: 6px;
        }
        .char-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #222;
            padding: 6px 10px;
            border-radius: 4px;
            border: 1px solid #333;
        }
        .char-label {
            font-size: 12px;
            font-weight: bold;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .radio-group {
            display: flex;
            gap: 2px;
        }
        .radio-btn {
            font-size: 10px;
            padding: 3px 6px;
            background: #333;
            color: #bbb;
            cursor: pointer;
            border-radius: 3px;
            user-select: none;
        }
        .radio-btn input { display: none; }
        .radio-btn.active-none { background: #444; color: #fff; }
        .radio-btn.active-main { background: #d97706; color: #fff; font-weight: bold; }
        .radio-btn.active-sub { background: #2563eb; color: #fff; font-weight: bold; }

        /* 分析結果スタイル */
        .analysis-result-wrapper {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
        }
        .strategy-card {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 6px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .strategy-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #374151;
            padding-bottom: 6px;
        }
        .opp-name { font-weight: bold; font-size: 14px; color: #fff; }
        .pick-info { display: flex; align-items: center; gap: 8px; }
        .best-pick {
            font-size: 11px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .best-rate { font-family: monospace; font-weight: bold; font-size: 13px; }
        .reason-text { font-size: 11px; color: #9ca3af; line-height: 1.4; }

        /* --- レスポンシブ・テーブル設定 --- */
        .table-wrapper {
            overflow-x: auto;
            overflow-y: auto;
            max-height: 50vh;
            border-radius: 8px;
            border: 1px solid #333;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 11px;
            text-align: center;
        }
        @media (min-width: 768px) { table { font-size: 12px; } }

        th, td {
            padding: 6px 4px;
            border-right: 1px solid #2d2d2d;
            border-bottom: 1px solid #2d2d2d;
            min-width: 48px;
            white-space: nowrap;
            transition: opacity 0.1s ease;
        }
        @media (min-width: 768px) {
            th, td { padding: 8px 6px; min-width: 55px; }
        }
        th {
            background-color: #252525;
            color: #aaa;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 3;
        }

        .row-char {
            background-color: #252525;
            color: #fff;
            text-align: left;
            font-weight: bold;
            padding-left: 10px;
            position: sticky;
            left: 0;
            z-index: 5;
            box-shadow: 2px 0 5px rgba(0,0,0,0.3);
        }
        th.row-char { z-index: 10; top: 0; }

        .total-cell {
            background-color: #2d3748;
            color: #ffcc00;
            font-weight: bold;
            font-size: 11px;
            position: sticky;
            left: 65px;
            z-index: 4;
            box-shadow: 2px 0 5px rgba(0,0,0,0.2);
        }
        @media (min-width: 768px) {
            .total-cell { font-size: 13px; left: 77px; }
        }
        th.total-cell {
            z-index: 9;
            top: 0;
            background-color: #2d3748;
        }

        tr:hover .row-char { background-color: #333; }
        tr:hover td { filter: brightness(1.2); cursor: pointer; }
        
        .legend {
            display: flex;
            gap: 10px;
            font-size: 11px;
            color: #aaa;
            justify-content: flex-start;
        }
        @media (min-width: 768px) {
            .legend { justify-content: flex-end; font-size: 12px; gap: 15px; }
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .box { width: 12px; height: 12px; border-radius: 3px; }

        /* ハイライト用 */
        .row-char, th:not(:first-child) { cursor: pointer; }
        .row-char.active-target, th.active-target {
            background-color: #0070f3 !important;
            color: #fff !important;
        }
        td.active-intersection {
            outline: 3px solid #ffcc00 !important;
            outline-offset: -3px;
            font-weight: bold;
        }
        table.has-active tr:not(.active-row) td:not(.total-cell) { opacity: 0.2; }
        table.has-active td:not(.active-col):not(.row-char) { opacity: 0.2; }
        table.has-active tr.active-row td.active-col { opacity: 1 !important; filter: brightness(1.2); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>STREET FIGHTER 6 総合対戦ダイヤグラム</h1>
            <div class="subtitle">※ 外部JSONデータからリアルタイムに同期。手札を設定すると最適な対面対策が出力されます。</div>
        </div>
        <div class="legend">
            <div class="legend-item"><div class="box" style="background: rgba(40, 167, 69, 0.8);"></div> 有利 (5.0+)</div>
            <div class="legend-item"><div class="box" style="background: #3a3a3a;"></div> 五分 (5.0)</div>
            <div class="legend-item"><div class="box" style="background: rgba(220, 53, 69, 0.8);"></div> 不利 (-5.0)</div>
        </div>
    </header>

    <div class="analyze-panel">
        <div class="search-title">🧠 手札（持ちキャラ）設定 ＆ 自動カウンター分析</div>
        <div class="hand-grid" id="handGrid"></div>
        <div class="analysis-result-wrapper" id="analysisResult">
            <div style="color: #888; font-size: 12px; padding: 10px;">手札に「メイン」または「サブ」のキャラを選択すると、相手ごとの戦略がここにリアルタイムで計算されます。</div>
        </div>
    </div>

    <div class="search-panel">
        <div class="search-title">🔍 キャラクター個別データ瞬時抽出 (スマホ推奨)</div>
        <select class="search-select" id="charSelector">
            <option value="">-- キャラクターを選択してください --</option>
        </select>
        <div class="result-container" id="resultContainer"></div>
    </div>

    <div class="table-wrapper">
        <table id="diagramTable">
            <thead>
                <tr id="tableHeaderRow"></tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    const table = document.getElementById('diagramTable');
    const headerRow = document.getElementById('tableHeaderRow');
    const tableBody = document.getElementById('tableBody');
    const selector = document.getElementById('charSelector');
    const resultContainer = document.getElementById('resultContainer');
    const handGrid = document.getElementById('handGrid');
    const analysisResult = document.getElementById('analysisResult');

    let characters = [];
    let matrixData = {};

    // 🎨 ダイヤの勝率数値に基づいた背景色のスタイルを生成する関数
    function getCellVisual(rate) {
        if (rate === null || rate === undefined) return 'background-color: #222; color: #555;';
        const diff = rate - 5.000;
        if (diff > 0) {
            const alpha = Math.min(0.8, diff * 2);
            return `background-color: rgba(40, 167, 69, ${alpha}); color: #fff; font-weight: bold;`;
        } else if (diff < 0) {
            const alpha = Math.min(0.8, Math.abs(diff) * 2);
            return `background-color: rgba(220, 53, 69, ${alpha}); color: #fff;`;
        }
        return 'background-color: #3a3a3a; color: #fff;';
    }

    // 🚀 JSONデータを非同期読み込みしてボード全体を初期化する
    async function initDiagram() {
        try {
            const response = await fetch('sf6.json');
            if (!response.ok) throw new Error('JSONファイルの読み込みに失敗しました。');
            matrixData = await response.json();
            
            // JSONの最上位キーから全キャラクター一覧を抽出
            characters = Object.keys(matrixData);

            buildUI();
        } catch (error) {
            console.error(error);
            analysisResult.innerHTML = `<div style="color: #f87171; font-size: 14px; padding: 10px;">エラー: ${error.message}<br>HTMLファイルと同じフォルダに「sf6.json」が存在するか確認してください。</div>`;
        }
    }

    // 🏗️ 画面上の各コンポーネントを動的に組み立てる関数
    function buildUI() {
        // 1. セレクトボックスと相性表ヘッダーの同期生成
        headerRow.innerHTML = '<th class="row-char">Character</th><th class="total-cell">Total</th>';
        characters.forEach(char => {
            // セレクトボックスに追加
            const opt = document.createElement('option');
            opt.value = char;
            opt.textContent = char;
            selector.appendChild(opt);

            // テーブルヘッダーに追加
            const th = document.createElement('th');
            th.setAttribute('data-char', char);
            th.textContent = char;
            headerRow.appendChild(th);
        });

        // 2. マトリクス（テーブルボディ）の行生成
        characters.forEach(myChar => {
            const tr = document.createElement('tr');
            tr.setAttribute('data-char', myChar);

            // キャラ名
            const tdName = document.createElement('td');
            tdName.className = 'row-char';
            tdName.textContent = myChar;
            tr.appendChild(tdName);

            // Total勝率
            const tdTotal = document.createElement('td');
            tdTotal.className = 'total-cell';
            const totalVal = matrixData[myChar]['Total'];
            tdTotal.textContent = totalVal !== undefined ? totalVal.toFixed(3) : '-';
            tr.appendChild(tdTotal);

            // 各対面勝率
            characters.forEach(oppChar => {
                const tdRate = document.createElement('td');
                tdRate.setAttribute('data-opp', oppChar);

                const rate = matrixData[myChar][oppChar];
                if (myChar === oppChar || rate === null || rate === undefined) {
                    tdRate.textContent = '-';
                    tdRate.style = 'background-color: #222; color: #555;';
                } else {
                    tdRate.textContent = rate.toFixed(3);
                    tdRate.style = getCellVisual(rate);
                }
                tr.appendChild(tdRate);
            });

            tableBody.appendChild(tr);
        });

        // 3. 手札設定用UIの配置
        characters.forEach(char => {
            const box = document.createElement('div');
            box.className = 'char-box';
            box.innerHTML = `
                <div class="char-label">${char}</div>
                <div class="radio-group">
                    <label class="radio-btn active-none"><input type="radio" name="role_${char}" value="none" checked>なし</label>
                    <label class="radio-btn"><input type="radio" name="role_${char}" value="main">メイン</label>
                    <label class="radio-btn"><input type="radio" name="role_${char}" value="sub">サブ</label>
                </div>
            `;
            handGrid.appendChild(box);
        });

        // イベントリスナーの再セット
        bindEvents();
    }

    // 🔗 各種インタラクション（クリック・変更）イベントのバインド
    function bindEvents() {
        // ラジオボタンのリアルタイム監視
        handGrid.addEventListener('change', () => {
            updateRadioStyles();
            runCounterAnalysis();
        });

        // 個別検索フォームの監視
        selector.addEventListener('change', (e) => {
            const charName = e.target.value;
            if (!charName) {
                resultContainer.innerHTML = '';
                clearAllHighlights();
                return;
            }
            highlightCharacter(charName);
        });

        // テーブルクリック時の抽出連動
        table.querySelectorAll('.row-char, thead th[data-char]').forEach(elem => {
            elem.addEventListener('click', () => {
                const charName = elem.getAttribute('data-char') || elem.textContent.trim();
                if(charName === "Character" || charName === "Total") return;
                selector.value = charName;
                highlightCharacter(charName);
            });
        });
    }

    // 手札選択時のビジュアルトグル
    function updateRadioStyles() {
        document.querySelectorAll('.char-box').forEach(box => {
            box.querySelectorAll('.radio-btn').forEach(label => {
                const input = label.querySelector('input');
                label.className = 'radio-btn';
                if (input.checked) {
                    if (input.value === 'none') label.classList.add('active-none');
                    if (input.value === 'main') label.classList.add('active-main');
                    if (input.value === 'sub') label.classList.add('active-sub');
                }
            });
        });
    }

    // 🧠 リアルタイム補正付き選出分析
    function runCounterAnalysis() {
        const selectedHand = {};
        let hasSelection = false;

        characters.forEach(char => {
            const checkedVal = document.querySelector(`input[name="role_${char}"]:checked`).value;
            if (checkedVal === 'main' || checkedVal === 'sub') {
                selectedHand[char] = checkedVal;
                hasSelection = true;
            }
        });

        if (!hasSelection) {
            analysisResult.innerHTML = `<div style="color: #888; font-size: 12px; padding: 10px;">手札に「メイン」または「サブ」のキャラを選択すると、相手ごとの戦略がここにリアルタイムで計算されます。</div>`;
            return;
        }

        let html = '';

        characters.forEach(oppChar => {
            const mainOptions = {};
            const subOptions = {};

            Object.keys(selectedHand).forEach(myChar => {
                const rate = matrixData[myChar]?.[oppChar];
                if (rate !== undefined && rate !== null) {
                    if (selectedHand[myChar] === 'main') {
                        mainOptions[myChar] = rate;
                    } else {
                        subOptions[myChar] = rate;
                    }
                }
            });

            let bestMainChar = null, bestMainRate = -1.0;
            Object.keys(mainOptions).forEach(c => {
                if (mainOptions[c] > bestMainRate) { bestMainRate = mainOptions[c]; bestMainChar = c; }
            });

            let bestSubChar = null, bestSubRate = -1.0;
            Object.keys(subOptions).forEach(c => {
                if (subOptions[c] > bestSubRate) { bestSubRate = subOptions[c]; bestSubChar = c; }
            });

            let finalBestChar = '-';
            let finalBestRate = 0.0;
            let reason = '';
            let badgeStyle = 'background: #4b5563; color: #fff;'; 

            if (bestMainRate > 5.000) {
                if (bestSubRate >= 5.100 && (bestSubRate - bestMainRate) >= 0.100) {
                    finalBestChar = bestSubChar;
                    finalBestRate = bestSubRate;
                    reason = `サブの ${bestSubChar} がメイン最高勝率 (${bestMainRate.toFixed(3)}) より 0.100 以上高いため、サブを投入します。`;
                    badgeStyle = 'background: #2563eb; color: #fff;';
                } else {
                    finalBestChar = bestMainChar;
                    finalBestRate = bestMainRate;
                    reason = `メインの ${bestMainChar} で有利が取れているため、そのままメインを続投します。`;
                    badgeStyle = 'background: #d97706; color: #fff;';
                }
            } else {
                if (bestSubChar && bestSubRate > bestMainRate) {
                    finalBestChar = bestSubChar;
                    finalBestRate = bestSubRate;
                    reason = `メインが不利・五分以下 (${bestMainRate > -1 ? bestMainRate.toFixed(3) : 'データ無'}) かつ、サブの ${bestSubChar} の方が勝率が高いため、被せとしてサブを採用します。`;
                    badgeStyle = 'background: #2563eb; color: #fff;';
                } else if (bestMainChar) {
                    finalBestChar = bestMainChar;
                    finalBestRate = bestMainRate;
                    reason = `メイン・サブ含めても有利はいませんが、手札の中で最もマシなメインの ${bestMainChar} を選択します。`;
                    badgeStyle = 'background: #d97706; color: #fff;';
                } else if (bestSubChar) {
                    finalBestChar = bestSubChar;
                    finalBestRate = bestSubRate;
                    reason = `メインの選択肢がありません。手札で最もマシなサブの ${bestSubChar} を選択します。`;
                    badgeStyle = 'background: #2563eb; color: #fff;';
                }
            }

            let rateClassStyle = 'color: #e5e7eb;';
            if (finalBestRate > 5.000) rateClassStyle = 'color: #34d399;';
            else if (finalBestRate > 0 && finalBestRate < 5.000) rateClassStyle = 'color: #f87171;';

            html += `
                <div class="strategy-card">
                    <div class="strategy-header">
                        <div class="opp-name">vs ${oppChar}</div>
                        <div class="pick-info">
                            <div class="best-pick" style="${badgeStyle}">${finalBestChar}</div>
                            <div class="best-rate" style="${rateClassStyle}">${finalBestRate > 0 ? finalBestRate.toFixed(3) : '-'}</div>
                        </div>
                    </div>
                    <div class="reason-text">${reason}</div>
                </div>
            `;
        });

        analysisResult.innerHTML = html;
    }

    // 🎯 ターゲットキャラのピンポイント相性ライン抽出
    function highlightCharacter(charName) {
        clearAllHighlights();
        
        const activeRow = table.querySelector(`tbody tr[data-char="${charName}"]`);
        const activeCols = table.querySelectorAll(`thead th[data-char="${charName}"]`);
        
        if (!activeRow) return;

        table.classList.add('has-active');
        activeRow.classList.add('active-row');
        
        activeRow.querySelector('.row-char').classList.add('active-target');
        
        // 縦列インデックスを特定してハイライト
        activeCols.forEach(col => {
            col.classList.add('active-target');
            const colIndex = col.cellIndex;
            table.querySelectorAll(`tbody tr`).forEach(tr => {
                const td = tr.cells[colIndex];
                if(td) td.classList.add('active-col');
            });
        });

        // 自キャラ交差点マーク
        const selfCell = activeRow.querySelector(`td[data-opp="${charName}"]`);
        if (selfCell) selfCell.classList.add('active-intersection');

        // スマホ用コンパクトカードリストの動的生成
        resultContainer.innerHTML = '';
        
        const totalVal = activeRow.querySelector('.total-cell').textContent.trim();
        createCardElement("Total 勝率", totalVal, "background-color:#2d3748; color:#ffcc00;");

        characters.forEach(oppName => {
            if (oppName === charName) return;
            const rate = matrixData[charName][oppName];
            const winRateStr = rate !== undefined && rate !== null ? rate.toFixed(3) : '-';
            const cellStyle = getCellVisual(rate);
            createCardElement(`vs ${oppName}`, winRateStr, cellStyle);
        });
    }

    function createCardElement(label, value, style) {
        const card = document.createElement('div');
        card.className = 'result-card';
        card.style.cssText = style; // インラインスタイルの適用方法を修正
        
        const nameDiv = document.createElement('div');
        nameDiv.className = 'result-char-name';
        nameDiv.textContent = label;
        
        const rateDiv = document.createElement('div');
        rateDiv.className = 'result-rate-val';
        rateDiv.textContent = value;
        
        card.appendChild(nameDiv);
        card.appendChild(rateDiv);
        resultContainer.appendChild(card);
    }

    function clearAllHighlights() {
        table.classList.remove('has-active');
        table.querySelectorAll('.active-target, .active-row, .active-col, .active-intersection').forEach(el => {
            el.classList.remove('active-target', 'active-row', 'active-col', 'active-intersection');
        });
    }

    // アプリ起動
    initDiagram();
