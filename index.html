<html lang="ja">
<head>

    <title>スト6 メイン固定型・補完チームシミュレーター</title>
    <style>

        .container { max-width: 850px; margin: 0 auto; }
        h1 { font-size: 20px; color: #fff; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
        @media (min-width: 768px) { h1 { font-size: 24px; } }
        h1::before { content: ''; display: inline-block; width: 6px; height: 24px; background: #0070f3; border-radius: 2px; }
        .subtitle { color: #718096; font-size: 13px; margin-bottom: 25px; }
        
        .panel { background: #141622; border: 1px solid #2d3748; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .panel-title { font-size: 14px; font-weight: bold; margin-bottom: 12px; color: #0070f3; display: flex; justify-content: space-between; }
        
        /* キャラ選択グリッド */
        .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 6px; margin-bottom: 15px; max-height: 200px; overflow-y: auto; padding-right: 5px; }
        @media (min-width: 768px) { .char-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); max-height: none; } }
        
        .char-label { display: flex; align-items: center; background: #222536; padding: 6px 10px; border-radius: 4px; cursor: pointer; user-select: none; font-size: 12px; font-weight: bold; border: 1px solid transparent; transition: all 0.2s; }
        .char-label input { margin-right: 6px; }
        .char-label.checked { background: #0070f3; color: #fff; border-color: #fff; box-shadow: 0 0 8px rgba(0,112,243,0.5); }
        
        /* 🎯 総チーム人数（デッキサイズ）選択フォーム */
        .deck-size-box { background: #1c1f30; border: 1px solid #2d3748; padding: 12px; border-radius: 6px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .deck-size-title { font-size: 13px; font-weight: bold; color: #cbd5e0; }
        .size-btn { background: #2d3748; color: #a0aec0; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; border: 2px solid transparent; display: none; }
        .size-btn.visible { display: inline-block; }
        .size-btn input { display: none; }
        .size-btn.selected { border-color: #38bdf8; color: #38bdf8; background: rgba(56, 189, 248, 0.1); }

        button.submit-btn { background: #0070f3; color: #fff; border: none; padding: 12px; font-size: 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; transition: background 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        button.submit-btn:hover { background: #0056b3; }
        button.submit-btn:disabled { background: #4a5568; color: #718096; cursor: not-allowed; box-shadow: none; }

        /* スカウト結果カード */
        .rank-card { background: #141622; border: 1px solid #2d3748; border-radius: 8px; padding: 15px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 10px; }
        @media (min-width: 550px) { .rank-card { flex-direction: row; justify-content: space-between; align-items: center; } }
        .card-left { display: flex; align-items: center; gap: 15px; }
        .rank-num { font-size: 22px; font-weight: bold; font-style: italic; color: #4a5568; min-width: 40px; }
        
        .rank-1 { border-color: #ffcc00; background: linear-gradient(135deg, #141622 75%, #2c2511); }
        .rank-1 .rank-num { color: #ffcc00; }
        
        .team-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .char-badge { background: #2d3748; color: #fff; padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 13px; border: 1px solid #4a5568; }
        .char-badge.main-tag { background: #0070f3; border-color: #66b1ff; } 
        .char-badge.sub-tag { background: #e2b81d; color: #000; border-color: #ffcc00; }  
        
        .score-group { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #222536; padding-top: 10px; }
        @media (min-width: 550px) { .score-group { display: block; text-align: right; border-top: none; padding-top: 0; } }
        
        .main-score { font-size: 22px; font-weight: bold; color: #38bdf8; font-family: monospace; }
        .sub-score { font-size: 11px; color: #718096; margin-top: 2px; }
        
        .weak-alert { font-size: 11px; color: #f56565; background: rgba(245, 101, 101, 0.1); border: 1px solid rgba(245, 101, 101, 0.2); padding: 5px 10px; border-radius: 4px; margin-top: 5px; text-align: left; }
        .perfect-alert { font-size: 11px; color: #48bb78; background: rgba(72, 187, 120, 0.1); border: 1px solid rgba(72, 187, 120, 0.2); padding: 5px 10px; border-radius: 4px; margin-top: 5px; font-weight: bold; text-align: left; }
    </style>
</head>

    };

    // アルファベット昇順にキャラクター名をソート
    const allCharacters = Object.keys(matrixData).sort();

    const charGrid = document.getElementById('charGrid');
    const counter = document.getElementById('counter');
    const deckSizeBox = document.getElementById('deckSizeBox');
    const resultSection = document.getElementById('resultSection');

    // 🏗️ アプリケーションの初期化（チェックボックス一覧の動的生成）
    function initApp() {
        allCharacters.forEach(char => {
            const label = document.createElement('label');
            label.className = 'char-label';
            label.innerHTML = `
                <input type="checkbox" name="main_chars[]" value="${char}">
                ${char}
            `;
            
            label.querySelector('input').addEventListener('change', function() {
                checkMainLimit(this);
            });
            
            charGrid.appendChild(label);
        });
    }

    // 🥋 ベースメインキャラの2体制限＆人数フォームの動的切り替え
    function checkMainLimit(checkbox) {
        const checkedBoxes = document.querySelectorAll('input[name="main_chars[]"]:checked');
        const checkedCount = checkedBoxes.length;
        
        counter.textContent = `選択中: ${checkedCount} / 2`;
        counter.style.color = (checkedCount >= 2) ? '#0070f3' : '#a0aec0';

        // 2体を超えたら即座にチェック解除してアラート
        if (checkedCount > 2) {
            checkbox.checked = false;
            alert("固定するベースメインキャラクターは最大2体までです。");
            updateLabelClasses();
            return;
        }
        
        updateLabelClasses();

        const submitBtn = document.getElementById('submitBtn');

        if (checkedCount === 0) {
            submitBtn.disabled = true;
            submitBtn.textContent = "ベースキャラを選択してください";
            deckSizeBox.style.display = "none";
            resultSection.innerHTML = "";
        } else {
            submitBtn.disabled = false;
            submitBtn.textContent = "このベースに最適なサブキャラクターを総当たり計算";
            deckSizeBox.style.display = "block";
            
            const btn2 = document.getElementById('btn_size2');
            const btn3 = document.getElementById('btn_size3');
            const btn4 = document.getElementById('btn_size4');

            // 選択されたキャラの数に応じて目指せるチーム人数ラジオボタンを出し分け
            if (checkedCount === 1) {
                btn2.classList.add('visible');
                btn3.classList.add('visible');
                btn4.classList.add('visible');
                
                const checkedRadio = document.querySelector('input[name="target_deck_size"]:checked');
                if (!checkedRadio) {
                    document.querySelector('input[name="target_deck_size"][value="2"]').checked = true;
                }
            } else if (checkedCount === 2) {
                btn2.classList.remove('visible');
                btn3.classList.add('visible');
                btn4.classList.add('visible');
                
                const checkedRadio = document.querySelector('input[name="target_deck_size"]:checked');
                if (!checkedRadio || checkedRadio.value === '2') {
                    document.querySelector('input[name="target_deck_size"][value="3"]').checked = true;
                }
            }
            updateSizeBtnStyles();
            
            // 人数が決定しているなら自動でリアルタイムに再計算を実行
            runDeckSimulation();
        }
    }

    // チェック状態ラベルのクラス更新
    function updateLabelClasses() {
        document.querySelectorAll('input[name="main_chars[]"]').forEach(cb => {
            if (cb.checked) {
                cb.parentElement.classList.add('checked');
            } else {
                cb.parentElement.classList.remove('checked');
            }
        });
    }

    // チーム総人数ラジオボタンの選択中スタイル同期
    function updateSizeBtnStyles() {
        document.querySelectorAll('.size-btn').forEach(label => {
            const rdo = label.querySelector('input');
            if (rdo.checked) {
                label.classList.add('selected');
            } else {
                label.classList.remove('selected');
            }
        });
    }

    // ラジオボタンをクリックした時も自動計算に繋げる
    document.querySelectorAll('input[name="target_deck_size"]').forEach(radio => {
        radio.addEventListener('change', () => {
            updateSizeBtnStyles();
            runDeckSimulation();
        });
    });

    // フォームのボタンクリック時
    document.getElementById('submitBtn').addEventListener('click', () => {
        runDeckSimulation();
    });

    // 🧠 【コアロジック】JavaScript版・デッキ補完総当たりシミュレーター
    function runDeckSimulation() {
        const checkedBoxes = document.querySelectorAll('input[name="main_chars[]"]:checked');
        const selectedMainChars = Array.from(checkedBoxes).map(cb => cb.value);
        const mainCount = selectedMainChars.length;
        
        if (mainCount === 0) return;

        const targetDeckSize = parseInt(document.querySelector('input[name="target_deck_size"]:checked').value);
        
        // メインキャラを除外した追加候補のサブキャラのリストを作成
        const candidates = allCharacters.filter(char => !selectedMainChars.includes(char));
        const candCount = candidates.length;
        const tempTeams = [];

        // 必要とされる追加サブ枠
        const neededSubs = targetDeckSize - mainCount;

        // パターン1: サブを1体追加する総当たり
        if (neededSubs === 1) {
            for (let i = 0; i < candCount; i++) {
                const addedSubs = [candidates[i]];
                const fullTeam = selectedMainChars.concat(addedSubs);
                tempTeams.push(evaluateTeamCoverage(fullTeam, addedSubs));
            }
        } 
        // パターン2: サブを2体追加する総当たり
        else if (neededSubs === 2) {
            for (let i = 0; i < candCount; i++) {
                for (let j = i + 1; j < candCount; j++) {
                    const addedSubs = [candidates[i], Sandy = candidates[j]];
                    const fullTeam = selectedMainChars.concat(addedSubs);
                    tempTeams.push(evaluateTeamCoverage(fullTeam, addedSubs));
                }
            }
        }
        // パターン3: サブを3体追加する総当たり
        else if (neededSubs === 3) {
            for (let i = 0; i < candCount; i++) {
                for (let j = i + 1; j < candCount; j++) {
                    for (let k = j + 1; k < candCount; k++) {
                        const addedSubs = [candidates[i], candidates[j], candidates[k]];
                        const fullTeam = selectedMainChars.concat(addedSubs);
                        tempTeams.push(evaluateTeamCoverage(fullTeam, addedSubs));
                    }
                }
            }
        }

        // チーム天敵数（全員不利）の少ない順 ➔ 平均カバー率の高い順にソート
        tempTeams.sort((a, b) => {
            if (a.weak_count !== b.weak_count) {
                return a.weak_count - b.weak_count;
            }
            return b.avg_coverage - a.avg_coverage;
        });

        // 上位20個を描画用として切り出し
        renderResults(tempTeams.slice(0, 20), selectedMainChars, targetDeckSize);
    }

    // 🎖️ チームの相性補完スコアを測るスコアリングヘルパー関数
    function evaluateTeamCoverage(fullTeam, addedSubs) {
        const charCount = allCharacters.length;
        let totalWinRate = 0;
        let weakCount = 0;
        const weakDetails = [];

        allCharacters.forEach(opp => {
            const rates = [];
            fullTeam.forEach(member => {
                // データが空なら五分(5.0)とする
                const r = (matrixData[member]?.[opp] !== undefined && matrixData[member]?.[opp] !== null) 
                          ? matrixData[member][opp] : 5.000;
                rates.push(r);
            });
            
            // チームの中で一番対面勝率が高い数値を被せとして採用
            const bestRate = Math.max(...rates);
            totalWinRate += bestRate;

            // 全員不利なら「共通天敵」
            if (bestRate < 5.000) {
                weakCount++;
                weakDetails.push(`${opp}(${bestRate.toFixed(3)})`);
            }
        });

        return {
            full_team: fullTeam,
            added_subs: addedSubs,
            avg_coverage: totalWinRate / charCount,
            weak_count: weakCount,
            weak_details: weakDetails
        };
    }

    // 📝 スカウト結果をDOMにレンダリングする関数
    function renderResults(bestTeams, selectedMainChars, targetDeckSize) {
        let html = `
            <h2>🔥 あなたのメインに最適な追加サブ候補 (Top 20)</h2>
            <div style="margin-bottom: 20px; font-size: 12px; color: #718096;">
                ベース：<strong style="color:#0070f3;">${selectedMainChars.join(', ')}</strong> ➔ 目標人数：<strong>${targetDeckSize}人デッキ</strong>
            </div>
        `;

        bestTeams.forEach((team, index) => {
            const rank = index + 1;
            const isNo1 = (rank === 1);
            
            let mainBadgesHTML = '';
            selectedMainChars.forEach(c => {
                mainBadgesHTML += `<span class="char-badge main-tag">${c}</span>`;
            });

            let subBadgesHTML = '';
            team.added_subs.forEach(c => {
                subBadgesHTML += `<span class="char-badge sub-tag">${c}</span>`;
            });

            let alertHTML = '';
            if (team.weak_count === 0) {
                alertHTML = `<div class="perfect-alert">🎉 相性補完完了！この組み合わせなら全キャラに5.000以上の最高勝率で被せが成立します。</div>`;
            } else {
                alertHTML = `
                    <div class="weak-alert">
                        ⚠️ この布陣でも残る共通の弱点（${team.weak_count}体）: 
                        ${team.weak_details.join(', ')}
                    </div>
                `;
            }

            html += `
                <div class="rank-card ${isNo1 ? 'rank-1' : ''}">
                    <div class="card-left">
                        <div class="rank-num">#${rank}</div>
                        <div>
                            <div class="team-tags">
                                ${mainBadgesHTML}
                                <span style="color:#718096; font-size:12px;">＋</span>
                                ${subBadgesHTML}
                            </div>
                            ${alertHTML}
                        </div>
                    </div>
                    <div class="score-group">
                        <div class="main-score">${team.avg_coverage.toFixed(3)}</div>
                        <div class="sub-score">最適選出時の平均勝率</div>
                    </div>
                </div>
            `;
        });

        resultSection.innerHTML = html;
    }

    // アプリ初期起動
    initApp();
</script>
