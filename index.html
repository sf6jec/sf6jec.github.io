<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スト6 総合対戦データ分析ポータル</title>
    <style>
        /* --- 全体基本スタイル --- */
        body {
            background-color: #0b0d17;
            color: #cbd5e0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 700px;
            background: #141622;
            padding: 25px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            text-align: center;
        }
        h1 {
            font-size: 22px;
            color: #fff;
            margin: 0 0 5px 0;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        @media (min-width: 768px) { h1 { font-size: 26px; } }
        h1::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 24px;
            background: #ffcc00;
            border-radius: 2px;
        }
        .subtitle {
            color: #718096;
            font-size: 13px;
            margin-bottom: 30px;
        }

        /* --- メニューグリッド（スマホ縦1列・PC横2列） --- */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        @media (min-width: 550px) {
            .menu-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* --- スタイリッシュボタンカード --- */
        .menu-card {
            background: #1e2235;
            border: 1px solid #2d324d;
            border-radius: 8px;
            padding: 20px 15px;
            text-decoration: none;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            cursor: pointer;
        }
        .menu-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,112,243,0.3);
            border-color: #0070f3;
            background: #232942;
        }
        .menu-card:active {
            transform: translateY(-1px);
        }

        /* アイコン色の個別指定 */
        .icon {
            font-size: 24px;
            line-height: 1;
        }
        .title-text {
            font-size: 15px;
            font-weight: bold;
            color: #fff;
        }
        .desc-text {
            font-size: 11px;
            color: #718096;
            line-height: 1.4;
        }

        /* アクセント用ボーダーカラー */
        .border-yellow { border-top: 3px solid #ffcc00; }
        .border-blue { border-top: 3px solid #0070f3; }
        .border-red { border-top: 3px solid #dc3545; }
        .border-purple { border-top: 3px solid #a855f7; }
    </style>
</head>
<body>

<div class="container">
    <h1>STREET FIGHTER 6 分析ボード</h1>
    <div class="subtitle">全期間のデータベース統計から割り出された、対面対策・チーム補完ツール群</div>

    <div class="menu-grid">
        <a href="analyze.html" class="menu-card border-yellow">
            <div class="icon">📊</div>
            <div class="title-text">分析＆対策ボード</div>
            <div class="desc-text">全体の相性マトリクス表と、手札に合わせたリアルタイムの被せキャラ自動選出</div>
        </a>

        <a href="view.html" class="menu-card border-blue">
            <div class="icon">🔍</div>
            <div class="title-text">個別ダイヤビューア</div>
            <div class="desc-text">キャラクター単体の対面ダイヤグラム一覧をスマホ幅で瞬時に縦スクロール抽出</div>
        </a>

        <a href="scouter.html" class="menu-card border-red">
            <div class="icon">💀</div>
            <div class="title-text">天敵ハンター</div>
            <div class="desc-text">現在の手札全員が勝率5.0を下回る「天敵」をあぶり出し、それを最も撃破できるサブを提案</div>
        </a>

        <a href="team_scouter.html" class="menu-card border-purple">
            <div class="icon">👑</div>
            <div class="title-text">チーム補完シミュレーター</div>
            <div class="desc-text">自分のメイン1~2体をベースに固定し、死角が0になる理論上最強の2〜4人編成を総当たり算出</div>
        </a>
    </div>
</div>

</body>
</html>
