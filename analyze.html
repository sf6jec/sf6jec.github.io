    };

    const orderedCharacterList = Object.keys(matrixData);

    const table = document.getElementById('diagramTable');
    const headerRow = document.getElementById('tableHeaderRow');
    const tableBody = document.getElementById('tableBody');
    const selector = document.getElementById('charSelector');
    const resultContainer = document.getElementById('resultContainer');
    const handGrid = document.getElementById('handGrid');
    
    const analysisDashboard = document.getElementById('analysisDashboard');
    const deckThead = document.getElementById('deckThead');
    const deckTbody = document.getElementById('deckTbody');
    const strategyList = document.getElementById('strategyList');

    function getCellVisual(rate) {
        if (rate === null || rate === undefined) return 'background-color: #222; color: #555;';
        const diff = rate - 5.000;
        if (diff > 0) {
            const alpha = Math.min(0.8, diff * 2);
            return `background-color: rgba(40, 167, 69, ${alpha}); color: #fff; font-weight: bold;`;
        } else if (diff < 0) {
            const alpha = Math.min(0.8, Math.abs(diff) * 2);
            return `background-color: rgba(220, 53, 69, ${alpha}); color: #fff;`;
        }
        return 'background-color: #3a3a3a; color: #fff;';
    }

    function getCharBadgeStyle(index) {
        const colors = [
            { hex: '#38bdf8', fg: '#000' }, // 1体目: スカイブルー
            { hex: '#a855f7', fg: '#fff' }, // 2体目: パープル
            { hex: '#f97316', fg: '#000' }, // 3体目: オレンジ
            { hex: '#ec4899', fg: '#fff' }  // 4体目: ピンク
        ];
        const color = colors[index] || { hex: '#4a5568', fg: '#fff' };
        return `background-color: ${color.hex}; color: ${color.fg}; font-weight: bold;`;
    }

    function initApp() {
        // 役割設定フォーム用のグリッドを生成
        orderedCharacterList.forEach(char => {
            const box = document.createElement('div');
            box.className = 'char-box';
            box.innerHTML = `
                <div class="char-name-label">${char}</div>
                <div class="radio-group">
                    <label class="radio-btn active-none"><input type="radio" name="role_${char}" value="none" checked>未選択</label>
                    <label class="radio-btn"><input type="radio" name="role_${char}" value="main">メイン</label>
                    <label class="radio-btn"><input type="radio" name="role_${char}" value="sub">サブ</label>
                </div>
            `;
            handGrid.appendChild(box);
        });

        bindEvents();
    }

    function bindEvents() {
        handGrid.addEventListener('change', () => {
            updateRadioStyles();
            runPHPStyleAnalysis();
        });
    }

    function updateRadioStyles() {
        document.querySelectorAll('.char-box').forEach(box => {
            box.querySelectorAll('.radio-btn').forEach(label => {
                const input = label.querySelector('input');
                label.className = 'radio-btn';
                if (input.checked) {
                    if (input.value === 'none') label.classList.add('active-none');
                    if (input.value === 'main') label.classList.add('active-main');
                    if (input.value === 'sub') label.classList.add('active-sub');
                }
            });
        });
    }

    // 🧠 リアルタイムデッキ補正分析（4.95マージンアルゴリズム）
    function runPHPStyleAnalysis() {
        const selectedHand = {};
        const handOrderList = [];

        orderedCharacterList.forEach(char => {
            const checkedVal = document.querySelector(`input[name="role_${char}"]:checked`).value;
            if (checkedVal === 'main' || checkedVal === 'sub') {
                selectedHand[char] = checkedVal;
                handOrderList.push(char);
            }
        });

        if (handOrderList.length === 0) {
            analysisDashboard.style.display = 'none';
            return;
        }

        analysisDashboard.style.display = 'grid';

        // --- 📊 左側：選択したデッキの相性表の生成 ---
        let theadHtml = `<tr><th class="row-char" style="top: 0; z-index: 10;">相手キャラ</th>`;
        handOrderList.forEach(myChar => {
            const role = selectedHand[myChar];
            theadHtml += `
                <th>
                    ${myChar}<br>
                    <span style="font-size:10px; color: ${role === 'main' ? '#66b1ff' : '#e2b81d'};">
                        [${role === 'main' ? 'メイン' : 'サブ'}]
                    </span>
                </th>
            `;
        });
        theadHtml += `</tr>`;
        deckThead.innerHTML = theadHtml;

        let tbodyHtml = `<tr><td class="row-char" style="color: #ffcc00;">Total (総合勝率)</td>`;
        handOrderList.forEach(myChar => {
            const totalVal = matrixData[myChar]['Total'];
            tbodyHtml += `
                <td style="font-weight: bold; color: #ffcc00; background: #232936;">
                    ${totalVal !== undefined ? totalVal.toFixed(3) : '-'}
                </td>
            `;
        });
        tbodyHtml += `</tr>`;

        orderedCharacterList.forEach(oppChar => {
            tbodyHtml += `<tr><td class="row-char">${oppChar}</td>`;
            handOrderList.forEach(myChar => {
                let rate = matrixData[myChar][oppChar];
                // マトリクス表データの同キャラ戦（null）を 5.000 に内部補正して表示
                if (myChar === oppChar) rate = 5.000;
                
                const display = (rate === null || rate === undefined) ? '-' : rate.toFixed(3);
                const cellStyle = getCellVisual(rate);
                tbodyHtml += `<td style="${cellStyle}">${display}</td>`;
            });
            tbodyHtml += `</tr>`;
        });
        deckTbody.innerHTML = tbodyHtml;

        // --- 🎯 右側：アルゴリズムによる最適選出リストの生成 ---
        let strategyHtml = '';

        orderedCharacterList.forEach(oppChar => {
            const mainOptions = {};
            const subOptions = {};

            handOrderList.forEach(myChar => {
                let rate = matrixData[myChar][oppChar];
                // 🌟【重要】同キャラ戦（nullデータ）の場合を 5.000 として内部判定に加算
                if (myChar === oppChar) rate = 5.000;

                if (rate !== null && rate !== undefined) {
                    if (selectedHand[myChar] === 'main') {
                        mainOptions[myChar] = rate;
                    } else {
                        subOptions[myChar] = rate;
                    }
                }
            });

            let bestMainChar = null, bestMainRate = -1.0;
            Object.keys(mainOptions).forEach(c => {
                if (mainOptions[c] > bestMainRate) { bestMainRate = mainOptions[c]; bestMainChar = c; }
            });

            let bestSubChar = null, bestSubRate = -1.0;
            Object.keys(subOptions).forEach(c => {
                if (subOptions[c] > bestSubRate) { bestSubRate = subOptions[c]; bestSubChar = c; }
            });

            let finalBestChar = '-';
            let finalBestRate = 0.0;
            let comment = '';

            // 判定ロジック（4.950を境界線とする）
            if (bestMainRate >= 4.950) {
                // メインキャラの誰かが4.950以上を確保できている場合（同キャラ5.000戦もここを通過）
                if (bestSubRate >= 4.950 && (bestSubRate - bestMainRate) >= 0.100) {
                    finalBestChar = bestSubChar;
                    finalBestRate = bestSubRate;
                    comment = 'サブが差0.1以上で圧倒';
                } else {
                    finalBestChar = bestMainChar;
                    finalBestRate = bestMainRate;
                    comment = 'メイン優先（僅差はメイン）';
                }
            } else {
                // 🌟 メインキャラが全員 4.950 未満（ガチ全滅）の場合
                // もしサブ枠に同キャラ戦（5.000）や他のマシなキャラがいれば、4.95未満のメインを弾いてそちらを自動選出
                if (bestSubRate > bestMainRate) {
                    finalBestChar = bestSubChar;
                    finalBestRate = bestSubRate;
                    comment = 'メイン不利のためサブを投入';
                } else {
                    finalBestChar = bestMainChar || '-';
                    finalBestRate = bestMainRate;
                    comment = '全員不利のためメインが最善';
                }
            }

            const foundIdx = handOrderList.indexOf(finalBestChar);
            const badgeStyle = (foundIdx !== -1) ? getCharBadgeStyle(foundIdx) : 'background-color: #4a5568; color: #fff;';
            const rateStyle = (finalBestRate >= 5.000) ? 'advantage' : 'disadvantage';

            strategyHtml += `
                <div class="strategy-item">
                    <div class="opp-name">vs <strong>${oppChar}</strong></div>
                    <span class="arrow">▶</span>
                    <div>
                        <div style="display: flex; align-items: center; gap: 12px; justify-content: flex-end;">
                            <div class="best-pick" style="${badgeStyle}">${finalBestChar}</div>
                            <div class="best-rate ${rateStyle}">${finalBestRate > 0 ? finalBestRate.toFixed(3) : '-'}</div>
                        </div>
                        <div class="reason-text">${comment}</div>
                    </div>
                </div>
            `;
        });

        strategyList.innerHTML = strategyHtml;
    }

    initApp();
</script>
