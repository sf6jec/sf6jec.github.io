        @media (min-width: 768px) { .char-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); max-height: none; } }

        .char-label input { margin-right: 6px; }
        .char-label.checked { background: #dc3545; color: #fff; border-color: #fff; box-shadow: 0 0 8px rgba(220,53,69,0.5); }

        /* 📱 レスポンシブダッシュボード */
        .dashboard { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 900px) { .dashboard { grid-template-columns: 340px 1fr; gap: 25px; } }

        .box-title { font-size: 15px; font-weight: bold; margin-bottom: 10px; color: #fff; border-left: 4px solid #dc3545; padding-left: 8px; }
        .status-box { background: #141622; border: 1px solid #2d3748; border-radius: 6px; padding: 12px; }
        
        .weak-list { max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .weak-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #222536; font-size: 12px; }
        .weak-item:last-child { border-bottom: none; }

            .scout-card { flex-direction: row; justify-content: space-between; align-items: center; }
        }
        .scout-card.rank-1 { border-color: #ff4d4d; background: linear-gradient(135deg, #141622 75%, #2a1416); }
        .scout-card.rank-2 { border-color: #e2b81d; }
        
        .card-left { display: flex; align-items: flex-start; gap: 10px; }
        .rank-num { font-size: 22px; font-weight: bold; font-style: italic; color: #718096; width: 35px; line-height: 1.1; }
        .rank-1 .rank-num { color: #ff4d4d; }
        .rank-2 .rank-num { color: #e2b81d; }
        
        .sub-name { font-size: 18px; font-weight: bold; color: #fff; line-height: 1.2; }
        
        /* 右側のスタッツグループ（スマホ時は左寄せ、PC時は右寄せ） */
        .stat-group { display: flex; flex-direction: row-reverse; justify-content: space-between; align-items: center; border-top: 1px solid #222536; padding-top: 10px; }
        @media (min-width: 550px) {

        .covered-enemies { font-size: 11px; margin-top: 8px; color: #a0aec0; background: #1c1f30; padding: 8px; border-radius: 4px; line-height: 1.5; text-align: left; }

    };

    const allCharacters = Object.keys(matrixData).sort();

    const charGrid = document.getElementById('charGrid');
    const counter = document.getElementById('counter');
    const weakList = document.getElementById('weakList');
    const scoutRankList = document.getElementById('scoutRankList');
    const dashboardSection = document.getElementById('dashboardSection');

    function initScouter() {
        allCharacters.forEach(char => {
            const label = document.createElement('label');
            label.className = 'char-label';
            label.innerHTML = `
                <input type="checkbox" name="main_chars[]" value="${char}">
                ${char}
            `;
            
            label.querySelector('input').addEventListener('change', function() {
                checkLimit(this);
            });
            
            charGrid.appendChild(label);
        });
    }

    function checkLimit(checkbox) {
        const checkedBoxes = document.querySelectorAll('input[name="main_chars[]"]:checked');
        const checkedCount = checkedBoxes.length;
        
        counter.textContent = `選択中: ${checkedCount} / 4`;
        counter.style.color = (checkedCount >= 4) ? '#dc3545' : '#a0aec0';

        if (checkedCount > 4) {
            checkbox.checked = false;
            alert("メインキャラクターとして選択できるのは最大4体までです。");
            updateLabels();
            return;
        }
        
        updateLabels();

        if (checkedCount > 0) {
            dashboardSection.style.display = 'grid';
            const selectedMainChars = Array.from(checkedBoxes).map(cb => cb.value);
            runScoutSimulation(selectedMainChars);
        } else {
            dashboardSection.style.display = 'none';
        }
    }

    function updateLabels() {
        document.querySelectorAll('input[name="main_chars[]"]').forEach(cb => {
            if (cb.checked) {
                cb.parentElement.classList.add('checked');
            } else {
                cb.parentElement.classList.remove('checked');
            }
        });
    }

    function runScoutSimulation(selectedMainChars) {
        const currentCoverage = {};
        const weakOpps = {};

        allCharacters.forEach(opp => {
            let bestCurrentRate = 0.0;
            let hasData = false;

            selectedMainChars.forEach(mainChar => {
                const rate = matrixData[mainChar]?.[opp];
                if (rate !== undefined && rate !== null) {
                    if (rate > bestCurrentRate) {
                        bestCurrentRate = rate;
                    }
                    hasData = true;
                }
            });

            currentCoverage[opp] = hasData ? bestCurrentRate : 5.000;

            // 🌟 【修正】天敵判定の境界を「5.000未満」から「4.950未満」へ引き下げ
            if (currentCoverage[opp] < 4.950) {
                weakOpps[opp] = currentCoverage[opp];
            }
        });

        renderWeakList(weakOpps);

        const recommendedSubs = [];
        const weakOppNames = Object.keys(weakOpps);

        allCharacters.forEach(candidateChar => {
            if (selectedMainChars.includes(candidateChar)) return;

            let improvedWeakCount = 0;
            let weakWinRateSum = 0;
            const coveredDetails = {};

            allCharacters.forEach(opp => {
                const currentRate = currentCoverage[opp];
                const candidateRate = (matrixData[candidateChar]?.[opp] !== undefined && matrixData[candidateChar]?.[opp] !== null) 
                                      ? matrixData[candidateChar][opp] : 5.000;

                // 🌟 【修正】4.950未満の本当の天敵だけを補完・シミュレーションの対象にする
                if (currentRate < 4.950) {
                    if (candidateRate >= 4.950) {
                        improvedWeakCount++;
                        coveredDetails[opp] = candidateRate;
                    }
                    weakWinRateSum += candidateRate;
                }
            });

            const weakCount = weakOppNames.length;
            const weakWinRateAvg = weakCount > 0 ? (weakWinRateSum / weakCount) : 5.000;

            recommendedSubs.push({
                sub_char: candidateChar,
                overcome_count: improvedWeakCount,
                weak_win_rate_avg: weakWinRateAvg,
                covered_details: coveredDetails
            });
        });

        recommendedSubs.sort((a, b) => {
            if (b.overcome_count !== a.overcome_count) {
                return b.overcome_count - a.overcome_count;
            }
            return b.weak_win_rate_avg - a.weak_win_rate_avg;
        });

        renderScoutRank(recommendedSubs.slice(0, 5), weakOppNames.length);
    }

    function renderWeakList(weakOpps) {
        const oppNames = Object.keys(weakOpps);
        if (oppNames.length === 0) {
            weakList.innerHTML = `<p style="color: #48bb78; font-weight: bold; font-size: 13px; margin: 5px 0;">🎉 完璧な布陣！全員4.950以上でカバー可能です。</p>`;
            return;
        }

        let html = `<p style="font-size: 12px; font-weight: bold; color: #ff4d4d; margin: 5px 0;">計 ${oppNames.length} 体の天敵がいます</p>`;
        oppNames.forEach(opp => {
            html += `
                <div class="weak-item">
                    <span>vs <strong>${opp}</strong></span>
                    <span class="text-lose">現在の最高勝率: ${weakOpps[opp].toFixed(3)}</span>
                </div>
            `;
        });
        weakList.innerHTML = html;
    }

    function renderScoutRank(displaySubs, totalWeakCount) {
        if (totalWeakCount === 0) {
            scoutRankList.innerHTML = `<p class="status-box" style="background:#141622; padding:12px; border-radius:6px; border:1px solid #2d3748;">現在ガチ天敵（4.95未満）がいないため、これ以上の補完用サブ追加は不要です！地力の高い強キャラをお好みで選んでください。</p>`;
            return;
        }

        let html = '';
        displaySubs.forEach((sub, index) => {
            const rank = index + 1;
            let cardClass = '';
            if (rank === 1) cardClass = 'rank-1';
            if (rank === 2) cardClass = 'rank-2';

            let enemyDetailsHTML = '';
            const coveredEnemies = Object.keys(sub.covered_details);

            if (sub.overcome_count > 0) {
                enemyDetailsHTML += `
                    <div class="covered-enemies">
                        <strong>【役割対象（4.950以上）に変える相手】</strong><br>
                `;
                coveredEnemies.forEach(opp => {
                    enemyDetailsHTML += `vs ${opp} ➔ <span class="text-win">${sub.covered_details[opp].toFixed(3)}</span><br>`;
                });
                enemyDetailsHTML += `</div>`;
            } else {
                enemyDetailsHTML += `
                    <div class="covered-enemies" style="color: #718096;">
                        ※勝率4.95以上の反撃は不可ですが、チーム全体のマイナスを一番和らげる候補です（天敵平均勝率: ${sub.weak_win_rate_avg.toFixed(3)}）
                    </div>
                `;
            }

            html += `
                <div class="scout-card ${cardClass}">
                    <div class="card-left">
                        <div class="rank-num">#${rank}</div>
                        <div>
                            <div class="sub-name">${sub.sub_char}</div>
                            <div class="overcome-tag">天敵撃破数: ${sub.overcome_count} / ${totalWeakCount} 体</div>
                            ${enemyDetailsHTML}
                        </div>
                    </div>
                    <div class="stat-group">
                        <div class="stat-main">${sub.overcome_count}</div>
                        <div class="stat-sub">天敵撃破数</div>
                    </div>
                </div>
            `;
        });

        scoutRankList.innerHTML = html;
    }

    initScouter();
</script>
